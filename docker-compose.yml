services:

  # ── ffmpeg (no profile — always included) ───────────────────────────────────
  ffmpeg:
    image: linuxserver/ffmpeg:latest
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./data/raw_videos:/data/raw_videos
    command: >
      -rtsp_transport tcp
      -i ${RTSP_URL:-rtsp://camera:password@192.168.0.213:554/stream1}
      -c copy
      -f segment
      -segment_time 600
      -segment_format mkv
      -strftime 1
      /data/raw_videos/%Y-%m-%d_%H-%M-%S.mkv
    restart: unless-stopped

  # ── Airflow (profile: airflow) ───────────────────────────────────────────────
  airflow-init:
    profiles: [airflow]
    build: {context: ., dockerfile: Dockerfile.pipeline}
    command: >
      bash -c "
      airflow db migrate
      "
    environment: &airflow-env
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////app/data/airflow/airflow.db
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      VM_URL: ${VM_URL:-http://victoriametrics:8428}
    volumes: &airflow-vols
      - ./dags:/app/dags
      - ./scripts:/app/scripts
      - ./models:/app/models
      - ./data:/app/data
      - ./yolov8n.pt:/app/yolov8n.pt:ro
    restart: "no"

  airflow-webserver:
    profiles: [airflow]
    build: {context: ., dockerfile: Dockerfile.pipeline}
    command: airflow api-server --port 8080
    ports: ["8081:8080"]
    environment: *airflow-env
    volumes: *airflow-vols
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    profiles: [airflow]
    build: {context: ., dockerfile: Dockerfile.pipeline}
    command: airflow scheduler
    environment: *airflow-env
    volumes: *airflow-vols
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Live detection (profile: live) ──────────────────────────────────────────
  cat-live:
    profiles: [live]
    build: {context: ., dockerfile: Dockerfile.pipeline}
    command: >
      python scripts/live_detect.py
      --source ${RTSP_URL:-rtsp://camera:password@192.168.0.213:554/stream1}
      --interval ${LIVE_INTERVAL:-1.0}
      --threshold ${LIVE_THRESHOLD:-0.6}
      --vm-url ${VM_URL:-http://victoriametrics:8428}
    volumes:
      - ./models:/app/models:ro
      - ./scripts:/app/scripts:ro
      - ./yolov8n.pt:/app/yolov8n.pt:ro
    environment:
      RTSP_URL: ${RTSP_URL:-rtsp://camera:password@192.168.0.213:554/stream1}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      VM_URL: ${VM_URL:-http://victoriametrics:8428}
    restart: unless-stopped

  # ── Monitoring (profile: monitoring) ────────────────────────────────────────
  mlflow:
    profiles: [monitoring]
    build: {context: ., dockerfile: Dockerfile.pipeline}
    command: >
      mlflow server --host 0.0.0.0 --port 5050
      --backend-store-uri sqlite:////app/data/mlflow/mlflow.db
      --default-artifact-root /app/data/mlflow/artifacts
    ports: ["5050:5050"]
    volumes: [./data:/app/data]
    restart: unless-stopped

  victoriametrics:
    profiles: [monitoring]
    image: victoriametrics/victoria-metrics:latest
    ports: ["8428:8428"]
    volumes: [vm_data:/victoria-metrics-data]
    command: -retentionPeriod=${VM_RETENTION:-365d}
    restart: unless-stopped

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  vm_data:
  grafana_data:
